<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Modern Chat UI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app-container d-flex">

  <!-- Sidebar -->
  <aside class="sidebar">
    <button class="btn btn-primary w-100 mb-3">+ New Chat</button>
    <div class="chat-history"></div>
    <div class="profile">User</div>
  </aside>

  <!-- Main Chat -->
  <div class="chat-container flex-grow-1 d-flex flex-column">

    <!-- Header -->
    <header class="chat-header d-flex justify-content-between align-items-center">
      <h5>AI Chat</h5>
      <button class="btn d-md-none" id="menuBtn"><i class="fa fa-bars"></i></button>
    </header>

    <!-- Welcome Screen -->
    <section class="welcome-screen text-center">
      <h2>How can I help?</h2>
      <div class="suggestions row">
        <div class="col-md-3 card suggestion">Explain AI</div>
        <div class="col-md-3 card suggestion">Write Code</div>
        <div class="col-md-3 card suggestion">Debug Issue</div>
        <div class="col-md-3 card suggestion">Generate Ideas</div>
      </div>
    </section>

    <!-- Messages -->
    <main class="messages flex-grow-1"></main>

    <!-- Typing Indicator -->
    <div class="typing-indicator d-none">
      <span></span><span></span><span></span>
    </div>

    <!-- Input -->
    <footer class="input-area d-flex">
      <textarea id="messageInput" placeholder="Type a message..."></textarea>
      <button id="sendBtn" disabled><i class="fa fa-paper-plane"></i></button>
    </footer>

  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="script.js"></script>

</body>
</html>
